<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="main-header">

    <div class="header-left">
        <div class="logo">SanaliQadam</div>
    </div>

    <div class="header-center">
        <img src="img/logo1.jpg" class="logo-icon" title="School">
        <img src="img/logo2.jpeg" class="logo-icon" title="Parliament">
    </div>

    <nav class="header-nav">
        <a href="index.html">Басты бет</a>
        <a href="test.html">Тест</a>
        <a href="challenge.html">Челлендж</a>
        <a href="forum.html">Форум</a>
        <a href="calc.html">Калькулятор</a>
    </nav>

</header>

<section class="hero fade">
    <div class="hero-box">
        <h1>🚫 Импульс трекер</h1>
        <p>7 күн бойы импульсивті сатып алуды бақыла. Дисциплинаңды өлше.</p>
    </div>
</section>

<section class="fade">

   <div class="card">
    <h3>📅 Апта прогресі</h3>

    <div id="tracker"></div>

    <div class="impulse-summary">
        Дисциплина: <span id="score">0</span> / 7
    </div>

    <div class="progress-bar">
        <div id="fill" class="progress-fill"></div>
    </div>

    <div class="impulse-actions">
        <button id="nextWeek" class="quiz-btn primary">Келесі апта</button>
        <button id="resetWeek" class="quiz-btn secondary">Тазалау</button>
    </div>
</div>

</section>

<footer>
    <div class="footer-grid">
        <div>
            <h3>SanaliQadam</h3>
            <p>Оқушыларға арналған қаржылық платформа</p>
        </div>

        <div>
            <h4>Байланыс</h4>
            <p>Email: school@gmail.com</p>
        </div>
    </div>

    <p class="footer-bottom">© 2026 SanaliQadam</p>
</footer>

</body>
</html>
